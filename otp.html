<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSR EV TECH</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Poppins", sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0b0b0b;
  color:white;
  overflow:hidden;
}

/* GRID */
body::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:
  linear-gradient(rgba(255,102,0,0.08) 1px, transparent 1px),
  linear-gradient(90deg, rgba(255,102,0,0.08) 1px, transparent 1px);
  background-size:60px 60px;
}

/* GLOW */
body::after{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:radial-gradient(circle, rgba(255,102,0,0.25), transparent);
  right:-100px;
  top:100px;
  filter:blur(80px);
}

/* BOX */
.container{
  width:350px;
  padding:35px;
  border-radius:16px;
  background:rgba(20,20,20,0.9);
  backdrop-filter:blur(12px);
  text-align:center;
  border:1px solid rgba(255,102,0,0.2);
  box-shadow:0 0 30px rgba(255,102,0,0.15);
  z-index:2;
}

/* TITLE */
h2{
  color:#ff6600;
  margin-bottom:10px;
}

/* OTP BOX */
.otp-box{
  display:flex;
  justify-content:center;
  gap:12px;
  margin:25px 0;
}

.otp-box input{
  width:55px;
  height:65px;
  font-size:22px;
  text-align:center;
  border-radius:10px;
  border:1px solid #333;
  background:#111;
  color:white;
  outline:none;
  transition:0.3s;
}

/* FOCUS */
.otp-box input:focus{
  border-color:#ff6600;
  box-shadow:0 0 12px rgba(255,102,0,0.8);
  transform:scale(1.08);
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#ff6600,#ff3300);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(255,102,0,0.7);
}

/* TIMER */
#timer{
  margin-top:12px;
  font-size:14px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="container">
  <h2>Verify OTP</h2>

  <form onsubmit="event.preventDefault(); verifyOTP();">

    <div class="otp-box">
      <input maxlength="1">
      <input maxlength="1">
      <input maxlength="1">
      <input maxlength="1">
    </div>

    <button class="btn">Verify OTP</button>

  </form>

  <p id="timer">Resend OTP in 30s</p>
</div>

<script>
const inputs=document.querySelectorAll(".otp-box input");

// auto focus
inputs[0].focus();

// typing behavior
inputs.forEach((input,i)=>{

  input.addEventListener("input",()=>{
    input.value=input.value.replace(/[^0-9]/g,"");

    if(input.value && i < inputs.length-1){
      inputs[i+1].focus();
    }
  });

  input.addEventListener("keydown",(e)=>{
    if(e.key==="Backspace" && !input.value && i>0){
      inputs[i-1].focus();
    }
  });

});

// paste support
document.addEventListener("paste",(e)=>{
  const data=e.clipboardData.getData("text").split("");
  inputs.forEach((input,i)=>{
    if(data[i]) input.value=data[i];
  });
});

// VERIFY
async function verifyOTP(){
  let otp="";
  inputs.forEach(i=>otp+=i.value);

  const email=localStorage.getItem("email");

  const res=await fetch("/verify-otp",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email,otp})
  });

  const data=await res.json();
  alert(data.message);

  if(data.success){
    window.location="dashboard.html";
  }
}

// TIMER
let time=30;
const timer=document.getElementById("timer");

const countdown=setInterval(()=>{
  time--;
  timer.innerText="Resend OTP in "+time+"s";

  if(time<=0){
    clearInterval(countdown);
    timer.innerHTML='<span onclick="resend()" style="color:#ff6600;cursor:pointer;">Resend OTP</span>';
  }
},1000);

// RESEND
async function resend(){
  const email=localStorage.getItem("email");

  await fetch("/send-otp",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email})
  });

  location.reload();
}
</script>

</body>
</html>
